<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Employee Records · Sekar & Co</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/">
        <span class="logo">⚡</span>
        <div>
          <h1>SEKAR &amp; CO</h1>
          <p class="tagline">Admin · Employee Records</p>
        </div>
      </a>
      <div class="header-spacer"></div>
      <nav class="header-nav" id="headerNav">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <h2 style="margin-top:0">Employee Records</h2>
      <div class="toolbar">
        <input type="text" id="search" placeholder="Search name, email, designation, division…" />
        <button class="btn btn-sm btn-secondary" id="refreshBtn">Refresh</button>
        <a class="btn btn-sm btn-secondary" id="exportCsv" href="#" download>⬇ All CSV</a>
        <a class="btn btn-sm btn-secondary" id="exportPdf" href="#">⬇ All PDF</a>
        <div class="spacer"></div>
        <span class="stat-badge" id="countBadge">0 records</span>
      </div>
      <div id="msg"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Designation</th><th>Division</th><th>Phone</th>
              <th>Email</th><th>Submitted</th><th></th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="7" class="center muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Detail modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal"></div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
